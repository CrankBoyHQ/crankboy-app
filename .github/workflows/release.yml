name: Release Build

on:
    push:
        tags:
            - "v*.*.*"

env:
    PLAYDATE_SDK_VERSION: "3.0.5"

jobs:
    build_device:
        name: Create Release Device Build
        runs-on: ubuntu-latest
        steps:
            # Step 1: Check out the repository's code and LFS files.
            - name: Checkout Repository
              uses: actions/checkout@v6
              with:
                  lfs: true

            # Step 2: Download or fallback to submodule for toolchain
            - name: Download Toolchain or Fallback to Submodule
              run: |
                  mkdir -p downloads

                  # Try downloading from crankboy.app first
                  echo "Attempting to download toolchain from crankboy.app..."

                  GCC_URL="https://crankboy.app/toolchain/linux/gcc-arm-none-eabi-9-2019-q4-major-x86_64-linux.tar.bz2"
                  SDK_URL="https://crankboy.app/toolchain/linux/PlaydateSDK-${{ env.PLAYDATE_SDK_VERSION }}.tar.gz"

                  GCC_DOWNLOADED=false
                  SDK_DOWNLOADED=false

                  if curl -fsSL --retry 3 --connect-timeout 30 -o downloads/gcc-arm-none-eabi-9-2019-q4-major-x86_64-linux.tar.bz2 "$GCC_URL"; then
                      echo "GCC toolchain downloaded successfully"
                      GCC_DOWNLOADED=true
                  else
                      echo "Failed to download GCC toolchain"
                  fi

                  if curl -fsSL --retry 3 --connect-timeout 30 -o downloads/PlaydateSDK-${{ env.PLAYDATE_SDK_VERSION }}.tar.gz "$SDK_URL"; then
                      echo "Playdate SDK downloaded successfully"
                      SDK_DOWNLOADED=true
                  else
                      echo "Failed to download Playdate SDK"
                  fi

                  # If either download failed, fallback to submodule
                  if [ "$GCC_DOWNLOADED" != "true" ] || [ "$SDK_DOWNLOADED" != "true" ]; then
                      echo "Falling back to toolchain submodule..."
                      git submodule update --init --depth 1 toolchain
                      TOOLCHAIN_DIR="toolchain/linux"
                  else
                      TOOLCHAIN_DIR="downloads"
                  fi

                  echo "TOOLCHAIN_DIR=$TOOLCHAIN_DIR" >> $GITHUB_ENV

            # Step 3: Setup ARM GCC Toolchain
            - name: Setup ARM GCC Toolchain
              run: |
                  echo "Extracting toolchain from $TOOLCHAIN_DIR/..."
                  tar -xjf "$TOOLCHAIN_DIR/gcc-arm-none-eabi-9-2019-q4-major-x86_64-linux.tar.bz2"
                  TOOLCHAIN_PATH="$GITHUB_WORKSPACE/gcc-arm-none-eabi-9-2019-q4-major/bin"
                  echo "Adding $TOOLCHAIN_PATH to the system PATH..."
                  echo "$TOOLCHAIN_PATH" >> $GITHUB_PATH

            # Step 4: Setup Playdate SDK and Verify Toolchain
            - name: Setup Playdate SDK and Verify Toolchain
              run: |
                  echo "Verifying compiler version:"
                  arm-none-eabi-gcc --version
                  echo "Extracting Playdate SDK from $TOOLCHAIN_DIR/..."
                  tar -xf "$TOOLCHAIN_DIR/PlaydateSDK-${{ env.PLAYDATE_SDK_VERSION }}.tar.gz"
                  SDK_DIR_NAME=$(ls -d PlaydateSDK-*/ | sed 's,/$,,')
                  echo "PLAYDATE_SDK_PATH=$GITHUB_WORKSPACE/$SDK_DIR_NAME" >> $GITHUB_ENV

            # Step 5: Build the Project for Device
            - name: Build Project for Device
              env:
                  COMMON_FLAGS: "-DENABLE_CPU_VALIDATION=0 -DGITHUB_RELEASE=1"
              run: make -j$(nproc) device

            # Step 5: Package the device build as a zip file
            - name: Package Device Build
              run: zip -r CrankBoy-Device.zip CrankBoy.pdx

            # Step 6: Upload the zipped artifact to be used in the release job
            - name: Upload Device Artifact
              uses: actions/upload-artifact@v6
              with:
                  name: device-build
                  path: CrankBoy-Device.zip

    build_simulator_linux:
        name: Create Release Simulator Build (Linux)
        runs-on: ubuntu-latest
        steps:
            # Step 1: Check out the repository's code and LFS files.
            - name: Checkout Repository
              uses: actions/checkout@v6
              with:
                  lfs: true

            # Step 2: Download or fallback to submodule for toolchain
            - name: Download Toolchain or Fallback to Submodule
              run: |
                  mkdir -p downloads

                  # Try downloading from crankboy.app first
                  echo "Attempting to download toolchain from crankboy.app..."

                  GCC_URL="https://crankboy.app/toolchain/linux/gcc-arm-none-eabi-9-2019-q4-major-x86_64-linux.tar.bz2"
                  SDK_URL="https://crankboy.app/toolchain/linux/PlaydateSDK-${{ env.PLAYDATE_SDK_VERSION }}.tar.gz"

                  GCC_DOWNLOADED=false
                  SDK_DOWNLOADED=false

                  if curl -fsSL --retry 3 --connect-timeout 30 -o downloads/gcc-arm-none-eabi-9-2019-q4-major-x86_64-linux.tar.bz2 "$GCC_URL"; then
                      echo "GCC toolchain downloaded successfully"
                      GCC_DOWNLOADED=true
                  else
                      echo "Failed to download GCC toolchain"
                  fi

                  if curl -fsSL --retry 3 --connect-timeout 30 -o downloads/PlaydateSDK-${{ env.PLAYDATE_SDK_VERSION }}.tar.gz "$SDK_URL"; then
                      echo "Playdate SDK downloaded successfully"
                      SDK_DOWNLOADED=true
                  else
                      echo "Failed to download Playdate SDK"
                  fi

                  # If either download failed, fallback to submodule
                  if [ "$GCC_DOWNLOADED" != "true" ] || [ "$SDK_DOWNLOADED" != "true" ]; then
                      echo "Falling back to toolchain submodule..."
                      git submodule update --init --depth 1 toolchain
                      TOOLCHAIN_DIR="toolchain/linux"
                  else
                      TOOLCHAIN_DIR="downloads"
                  fi

                  echo "TOOLCHAIN_DIR=$TOOLCHAIN_DIR" >> $GITHUB_ENV

            # Step 3: Setup ARM GCC Toolchain
            - name: Setup ARM GCC Toolchain
              run: |
                  echo "Extracting toolchain from $TOOLCHAIN_DIR/..."
                  tar -xjf "$TOOLCHAIN_DIR/gcc-arm-none-eabi-9-2019-q4-major-x86_64-linux.tar.bz2"
                  TOOLCHAIN_PATH="$GITHUB_WORKSPACE/gcc-arm-none-eabi-9-2019-q4-major/bin"
                  echo "Adding $TOOLCHAIN_PATH to the system PATH..."
                  echo "$TOOLCHAIN_PATH" >> $GITHUB_PATH

            # Step 4: Setup Playdate SDK and Verify Toolchain
            - name: Setup Playdate SDK and Verify Toolchain
              run: |
                  echo "Verifying compiler version:"
                  arm-none-eabi-gcc --version
                  echo "Extracting Playdate SDK from $TOOLCHAIN_DIR/..."
                  tar -xf "$TOOLCHAIN_DIR/PlaydateSDK-${{ env.PLAYDATE_SDK_VERSION }}.tar.gz"
                  SDK_DIR_NAME=$(ls -d PlaydateSDK-*/ | sed 's,/$,,')
                  echo "PLAYDATE_SDK_PATH=$GITHUB_WORKSPACE/$SDK_DIR_NAME" >> $GITHUB_ENV

            # Step 5: Build a universal .pdx for both Device and Simulator
            - name: Build Universal Project (Device & Simulator)
              env:
                  COMMON_FLAGS: "-DENABLE_CPU_VALIDATION=0 -DGITHUB_RELEASE=1"
              run: make -j$(nproc)

            # Step 6: Package the simulator build as a zip file
            - name: Package Linux Simulator Build
              run: zip -r CrankBoy-Simulator-Linux.zip CrankBoy.pdx

            # Step 7: Upload the zipped artifact
            - name: Upload Linux Simulator Artifact
              uses: actions/upload-artifact@v6
              with:
                  name: simulator-linux-build
                  path: CrankBoy-Simulator-Linux.zip

    build_simulator_macos:
        name: Create Release Simulator Build (macOS)
        runs-on: macos-latest
        steps:
            # Step 1: Check out the repository's code and LFS files.
            - name: Checkout Repository
              uses: actions/checkout@v6
              with:
                  lfs: true

            # Step 2: Download or fallback to submodule for SDK
            - name: Download SDK or Fallback to Submodule
              run: |
                  mkdir -p downloads

                  # Try downloading from crankboy.app first
                  echo "Attempting to download SDK from crankboy.app..."

                  SDK_URL="https://crankboy.app/toolchain/mac/PlaydateSDK-${{ env.PLAYDATE_SDK_VERSION }}.zip"

                  if curl -fsSL --retry 3 --connect-timeout 30 -o downloads/PlaydateSDK-${{ env.PLAYDATE_SDK_VERSION }}.zip "$SDK_URL"; then
                      echo "Playdate SDK downloaded successfully"
                      TOOLCHAIN_DIR="downloads"
                  else
                      echo "Failed to download Playdate SDK, falling back to submodule..."
                      git submodule update --init --depth 1 toolchain
                      TOOLCHAIN_DIR="toolchain/mac"
                  fi

                  echo "TOOLCHAIN_DIR=$TOOLCHAIN_DIR" >> $GITHUB_ENV

            # Step 3: Unzip and Install Playdate SDK
            - name: Unzip and Install Playdate SDK
              run: |
                  echo "Unzipping SDK archive from $TOOLCHAIN_DIR/..."
                  unzip "$TOOLCHAIN_DIR/PlaydateSDK-${{ env.PLAYDATE_SDK_VERSION }}.zip"

                  PKG_PATH=$(find . -name "PlaydateSDK.pkg" -print -quit)
                  if [[ -z "$PKG_PATH" ]]; then
                      echo "PlaydateSDK.pkg not found after unzipping!"
                      exit 1
                  fi

                  echo "Installing $PKG_PATH..."
                  sudo installer -pkg "$PKG_PATH" -target /

                  echo "PLAYDATE_SDK_PATH=$HOME/Developer/PlaydateSDK" >> $GITHUB_ENV

            # Step 4: Build Universal Project (Device & Simulator)
            - name: Build Universal Project (Device & Simulator)
              env:
                  COMMON_FLAGS: "-DENABLE_CPU_VALIDATION=0 -DGITHUB_RELEASE=1"
              run: make -j$(sysctl -n hw.ncpu)

            # Step 5: Import Code Signing Certificates
            - name: Import Code Signing Certificates
              uses: apple-actions/import-codesign-certs@v3
              with:
                  p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
                  p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
                  keychain-password: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}

            # Step 6: Sign pdex.dylib
            - name: Sign pdex.dylib
              run: |
                  CERT_SHA1="${{ secrets.MACOS_CERTIFICATE_SHA1 }}"
                  DYLIB_PATH="CrankBoy.pdx/pdex.dylib"

                  # Remove any existing signature first
                  codesign --remove-signature "$DYLIB_PATH" 2>/dev/null || true

                  # Sign the dylib with hardened runtime
                  codesign --force --timestamp --options runtime --sign "$CERT_SHA1" "$DYLIB_PATH"

                  # Verify signature
                  codesign --verify --verbose "$DYLIB_PATH"

            # Step 7: Create Signed ZIP
            - name: Create Signed ZIP
              run: |
                  /usr/bin/ditto -c -k --sequesterRsrc --keepParent CrankBoy.pdx CrankBoy-Simulator-macOS.zip

            # Step 8: Notarize ZIP
            - name: Notarize ZIP
              run: |
                  xcrun notarytool submit CrankBoy-Simulator-macOS.zip \
                    --apple-id "${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}" \
                    --team-id "${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}" \
                    --password "${{ secrets.MACOS_NOTARIZATION_PASSWORD }}" \
                    --wait

            # Step 9: Upload macOS Simulator Artifact
            - name: Upload macOS Simulator Artifact
              uses: actions/upload-artifact@v6
              with:
                  name: simulator-macos-build
                  path: CrankBoy-Simulator-macOS.zip

    build_simulator_windows:
        name: Create Release Simulator Build (Windows)
        runs-on: windows-latest
        defaults:
            run:
                shell: msys2 {0}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6
              with:
                  lfs: true

            - name: Setup MSYS2 MinGW64
              uses: msys2/setup-msys2@v2
              with:
                  msystem: MINGW64
                  update: true
                  install: >-
                      mingw-w64-x86_64-gcc
                      mingw-w64-x86_64-make
                      mingw-w64-x86_64-cmake
                      mingw-w64-x86_64-pkg-config
                      make
                      unzip
                      p7zip
                      curl
                      tar
                      git
                      zip

            - name: Download Toolchain or Fallback to Submodule
              run: |
                  mkdir -p downloads

                  # Try downloading from crankboy.app first
                  echo "Attempting to download toolchain from crankboy.app..."

                  GCC_URL="https://crankboy.app/toolchain/win/gcc-arm-none-eabi-9-2019-q4-major-win32.zip"
                  SDK_URL="https://crankboy.app/toolchain/win/PlaydateSDK-${{ env.PLAYDATE_SDK_VERSION }}.exe"

                  GCC_DOWNLOADED=false
                  SDK_DOWNLOADED=false

                  if curl -fsSL --retry 3 --connect-timeout 30 -o downloads/gcc-arm-none-eabi-9-2019-q4-major-win32.zip "$GCC_URL"; then
                      echo "GCC toolchain downloaded successfully"
                      GCC_DOWNLOADED=true
                  else
                      echo "Failed to download GCC toolchain"
                  fi

                  if curl -fsSL --retry 3 --connect-timeout 30 -o downloads/PlaydateSDK-${{ env.PLAYDATE_SDK_VERSION }}.exe "$SDK_URL"; then
                      echo "Playdate SDK downloaded successfully"
                      SDK_DOWNLOADED=true
                  else
                      echo "Failed to download Playdate SDK"
                  fi

                  # If either download failed, fallback to submodule
                  if [ "$GCC_DOWNLOADED" != "true" ] || [ "$SDK_DOWNLOADED" != "true" ]; then
                      echo "Falling back to toolchain submodule..."
                      git submodule update --init --depth 1 toolchain
                      TOOLCHAIN_DIR="toolchain/win"
                  else
                      TOOLCHAIN_DIR="downloads"
                  fi

                  echo "TOOLCHAIN_DIR=$TOOLCHAIN_DIR" >> $GITHUB_ENV

            - name: Setup ARM GCC Toolchain and Playdate SDK
              run: |
                  echo "Extracting ARM GCC toolchain from $TOOLCHAIN_DIR/..."
                  7z x "$TOOLCHAIN_DIR/gcc-arm-none-eabi-9-2019-q4-major-win32.zip" -ogcc-arm-toolchain -y
                  TOOLCHAIN_PATH="$(pwd)/gcc-arm-toolchain/bin"
                  echo "$TOOLCHAIN_PATH" >> $GITHUB_PATH
                  echo "Extracting SDK from $TOOLCHAIN_DIR/..."
                  7z x "$TOOLCHAIN_DIR/PlaydateSDK-${{ env.PLAYDATE_SDK_VERSION }}.exe" -oPlaydateSDK -y
                  echo "PLAYDATE_SDK_PATH=$(pwd)/PlaydateSDK" >> $GITHUB_ENV

            - name: Build Universal Project (Device & Simulator) for Windows
              run: |
                  export PLAYDATE_SDK_PATH="$(pwd)/PlaydateSDK"
                  export PATH="$(pwd)/gcc-arm-toolchain/bin:$PATH"
                  export COMMON_FLAGS="-DENABLE_CPU_VALIDATION=0 -DGITHUB_RELEASE=1"
                  # Create build directory
                  mkdir -p build

                  # Build device binary using ARM GCC
                  echo "Building device binary..."
                  arm-none-eabi-gcc --version
                  make -j$(nproc) device

                  # Build simulator extension DLL
                  echo "Building simulator DLL..."
                  gcc -static -shared -DTARGET_SIMULATOR=1 -DTARGET_EXTENSION=1 $COMMON_FLAGS \
                      -I . -I "$PLAYDATE_SDK_PATH/C_API" -I src -I libs \
                      -I libs/minigb_apu -I libs/lz4 -I libs/pdnewlib \
                      -o build/pdex.dll \
                      src/cscripts/*.c src/*.c src/scenes/*.c \
                      libs/minigb_apu/minigb_apu.c libs/pdnewlib/pdnewlib.c main.c \
                      libs/lz4/lz4.c libs/miniz/miniz.c libs/miniz/mini_gzip.c \
                      "$PLAYDATE_SDK_PATH/C_API/buildsupport/setup.c"

                  # Copy DLL to existing .pdx folder (which now contains device binary)
                  cp build/pdex.dll CrankBoy.pdx/

            - name: Package Windows Simulator Build
              run: |
                  zip -r CrankBoy-Simulator-Windows.zip CrankBoy.pdx

            - name: Upload Windows Simulator Artifact
              uses: actions/upload-artifact@v6
              with:
                  name: simulator-windows-build
                  path: CrankBoy-Simulator-Windows.zip

    release:
        name: Create Draft Release and Upload Assets
        runs-on: ubuntu-latest
        needs: [build_device, build_simulator_linux, build_simulator_macos, build_simulator_windows]
        permissions:
            contents: write

        steps:
            # Step 1: Check out the repository's code with full history
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            # Step 2: Download all artifacts from the build jobs
            - name: Download all build artifacts
              uses: actions/download-artifact@v7
              with:
                  path: artifacts

            # Step 3: Generate release notes with a changelog link
            - name: Generate Release Notes
              id: generate_notes
              run: |
                  # Get the previous tag by sorting all tags by version number in descending order and picking the second one
                  PREVIOUS_TAG=$(git tag --sort=-v:refname | sed -n '2p')

                  # Check if a previous tag was found
                  if [ -n "$PREVIOUS_TAG" ]; then
                    echo "Found previous tag: $PREVIOUS_TAG"
                    COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${{ github.ref_name }}"
                  else
                    # If no previous tag, compare against the first commit of the repo
                    echo "No previous tag found. Comparing against the initial commit."
                    FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD)
                    COMPARE_URL="https://github.com/${{ github.repository }}/compare/${FIRST_COMMIT}...${{ github.ref_name }}"
                  fi

                  # Using a heredoc to save the multiline release notes to a GitHub Actions environment variable
                  # This makes it available to subsequent steps as `env.RELEASE_NOTES`
                  echo 'RELEASE_NOTES<<EOF' >> $GITHUB_ENV
                  echo "**Full Changelog**: ${COMPARE_URL}" >> $GITHUB_ENV
                  echo 'EOF' >> $GITHUB_ENV

            # Step 4: Create a new draft release and upload the assets
            - name: Create Draft Release and Upload Assets
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create ${{ github.ref_name }} \
                    --draft \
                    --title "Release ${{ github.ref_name }}" \
                    --notes "${{ env.RELEASE_NOTES }}" \
                    artifacts/**/*.zip
