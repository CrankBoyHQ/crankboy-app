name: Update Wiki Game List

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    update-wiki:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: master

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Generate Wiki Content
              run: |
                  python3 .github/scripts/extract_cscripts.py "${{ github.ref_name }}" > wiki_page.md

            - name: Clone Wiki Repository
              run: |
                  git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/CrankBoyHQ/crankboy-app.wiki.git wiki

            - name: Update Wiki Page
              run: |
                  cp wiki_page.md wiki/List-of-Games-with-Custom-Playdate-Settings.md

            - name: Commit and Push Wiki Changes
              run: |
                  cd wiki
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add List-of-Games-with-Custom-Playdate-Settings.md
                  git diff --cached --quiet || git commit -m "Update game list for ${{ github.ref_name }}"
                  git push
