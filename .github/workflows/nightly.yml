name: Nightly Build

on:
    # Triggers the workflow at 03:00 UTC every day.
    schedule:
        - cron: "0 3 * * *"

    # Allows you to run this workflow manually from the Actions tab on GitHub.
    workflow_dispatch:

jobs:
    check_for_commits:
        name: Check for Recent Commits
        runs-on: ubuntu-latest
        outputs:
            has_new_commits: ${{ steps.check_git.outputs.has_new_commits }}
        steps:
            # Step 1: Checkout repository history without LFS files
            - name: Checkout for commit history check
              uses: actions/checkout@v4
              with:
                  lfs: false
                  fetch-depth: 0

            # Step 2: Check for commits in the last 24 hours and set an output
            - name: Check for commits in the last 24 hours
              id: check_git
              run: |
                  if [ -z "$(git log --since='yesterday' --oneline)" ]; then
                    echo "No new commits found. Halting workflow."
                    echo "has_new_commits=false" >> $GITHUB_OUTPUT
                  else
                    echo "New commits found. Proceeding with builds."
                    echo "has_new_commits=true" >> $GITHUB_OUTPUT
                  fi

    build_device:
        name: Create Nightly Device Build
        needs: check_for_commits
        if: needs.check_for_commits.outputs.has_new_commits == 'true'
        runs-on: ubuntu-latest
        steps:
            # Step 1: Check out the repository's code, submodules, and LFS files.
            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                  submodules: "recursive"
                  lfs: true

            # Step 2: Setup ARM GCC Toolchain from Submodule
            - name: Setup ARM GCC Toolchain from Submodule
              run: |
                  echo "Extracting toolchain from toolchain/linux/..."
                  tar -xjf toolchain/linux/gcc-arm-none-eabi-9-2019-q4-major-x86_64-linux.tar.bz2
                  TOOLCHAIN_PATH="$GITHUB_WORKSPACE/gcc-arm-none-eabi-9-2019-q4-major/bin"
                  echo "Adding $TOOLCHAIN_PATH to the system PATH..."
                  echo "$TOOLCHAIN_PATH" >> $GITHUB_PATH

            # Step 3: Setup Playdate SDK from Submodule and Verify Toolchain
            - name: Setup Playdate SDK from Submodule and Verify Toolchain
              run: |
                  echo "Verifying compiler version:"
                  arm-none-eabi-gcc --version
                  echo "Extracting Playdate SDK from toolchain/linux/..."
                  tar -xf toolchain/linux/PlaydateSDK-3.0.0.tar.gz
                  SDK_DIR_NAME=$(ls -d PlaydateSDK-*/ | sed 's,/$,,')
                  echo "PLAYDATE_SDK_PATH=$GITHUB_WORKSPACE/$SDK_DIR_NAME" >> $GITHUB_ENV

            # Step 4: Update Version and Build Number in pdxinfo
            - name: Update Version and Build Number
              run: |
                  DATE_STAMP=$(date +'%Y%m%d')
                  CURRENT_VERSION=$(grep '^version=' Source/pdxinfo | cut -d '=' -f 2)
                  NEW_VERSION="${CURRENT_VERSION}.${DATE_STAMP}"
                  echo "Updating version in Source/pdxinfo to $NEW_VERSION"
                  sed -i -e "s/^version=.*/version=$NEW_VERSION/" -e "s/^buildNumber=.*/buildNumber=$DATE_STAMP/" Source/pdxinfo
                  echo "Contents of pdxinfo after update:"
                  cat Source/pdxinfo

            # Step 5: Build the Project for Device
            - name: Build Project for Device
              run: make -j$(nproc) device

            # Step 6: Get Device Artifact Name
            - name: Get Device Artifact Name
              id: artifact_details
              run: |
                  APP_VERSION=$(grep '^version=' Source/pdxinfo | cut -d '=' -f 2)
                  ARTIFACT_NAME="CrankBoy-Device-${APP_VERSION}-nightly"
                  echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT

            # Step 7: Prepare Artifact for Upload
            - name: Prepare Artifact for Upload
              run: |
                  mkdir artifact_root
                  mv CrankBoy.pdx artifact_root/

            # Step 8: Upload the .pdx Directory
            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.artifact_details.outputs.artifact_name }}
                  path: artifact_root/

    build_simulator_linux:
        name: Create Nightly Simulator Build (Linux)
        needs: check_for_commits
        if: needs.check_for_commits.outputs.has_new_commits == 'true'
        runs-on: ubuntu-latest
        steps:
            # Step 1: Check out the repository's code, submodules, and LFS files.
            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                  submodules: "recursive"
                  lfs: true

            # Step 2: Setup ARM GCC Toolchain from Submodule
            - name: Setup ARM GCC Toolchain from Submodule
              run: |
                  echo "Extracting toolchain from toolchain/linux/..."
                  tar -xjf toolchain/linux/gcc-arm-none-eabi-9-2019-q4-major-x86_64-linux.tar.bz2
                  TOOLCHAIN_PATH="$GITHUB_WORKSPACE/gcc-arm-none-eabi-9-2019-q4-major/bin"
                  echo "Adding $TOOLCHAIN_PATH to the system PATH..."
                  echo "$TOOLCHAIN_PATH" >> $GITHUB_PATH

            # Step 3: Setup Playdate SDK from Submodule and Verify Toolchain
            - name: Setup Playdate SDK from Submodule and Verify Toolchain
              run: |
                  echo "Verifying compiler version:"
                  arm-none-eabi-gcc --version
                  echo "Extracting Playdate SDK from toolchain/linux/..."
                  tar -xf toolchain/linux/PlaydateSDK-3.0.0.tar.gz
                  SDK_DIR_NAME=$(ls -d PlaydateSDK-*/ | sed 's,/$,,')
                  echo "PLAYDATE_SDK_PATH=$GITHUB_WORKSPACE/$SDK_DIR_NAME" >> $GITHUB_ENV

            # Step 4: Update Version and Build Number in pdxinfo
            - name: Update Version and Build Number
              run: |
                  DATE_STAMP=$(date +'%Y%m%d')
                  CURRENT_VERSION=$(grep '^version=' Source/pdxinfo | cut -d '=' -f 2)
                  NEW_VERSION="${CURRENT_VERSION}.${DATE_STAMP}"
                  echo "Updating version in Source/pdxinfo to $NEW_VERSION"
                  sed -i -e "s/^version=.*/version=$NEW_VERSION/" -e "s/^buildNumber=.*/buildNumber=$DATE_STAMP/" Source/pdxinfo
                  echo "Contents of pdxinfo after update:"
                  cat Source/pdxinfo

            # Step 5: Build a universal .pdx for both Device and Simulator
            - name: Build Universal Project (Device & Simulator)
              run: make -j$(nproc)

            # Step 6: Get Simulator Artifact Name
            - name: Get Simulator Artifact Name
              id: artifact_details
              run: |
                  APP_VERSION=$(grep '^version=' Source/pdxinfo | cut -d '=' -f 2)
                  ARTIFACT_NAME="CrankBoy-Simulator-${APP_VERSION}-nightly-linux"
                  echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT

            # Step 7: Prepare Artifact for Upload
            - name: Prepare Artifact for Upload
              run: |
                  mkdir artifact_root
                  mv CrankBoy.pdx artifact_root/

            # Step 8: Upload Simulator Artifact
            - name: Upload Simulator Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.artifact_details.outputs.artifact_name }}
                  path: artifact_root/

    build_simulator_macos:
        name: Create Nightly Simulator Build (macOS)
        needs: check_for_commits
        if: needs.check_for_commits.outputs.has_new_commits == 'true'
        runs-on: macos-latest
        steps:
            # Step 1: Check out the repository's code, submodules, and LFS files.
            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                  submodules: "recursive"
                  lfs: true

            # Step 2: Unzip and Install Playdate SDK from Submodule
            - name: Unzip and Install Playdate SDK from Submodule
              run: |
                  echo "Unzipping SDK archive from toolchain/mac/..."
                  unzip toolchain/mac/PlaydateSDK-3.0.0.zip

                  PKG_PATH=$(find . -name "PlaydateSDK.pkg" -print -quit)
                  if [[ -z "$PKG_PATH" ]]; then
                      echo "PlaydateSDK.pkg not found after unzipping!"
                      exit 1
                  fi

                  echo "Installing $PKG_PATH..."
                  sudo installer -pkg "$PKG_PATH" -target /

                  echo "PLAYDATE_SDK_PATH=$HOME/Developer/PlaydateSDK" >> $GITHUB_ENV

            # Step 3: Update Version and Build Number
            - name: Update Version and Build Number
              run: |
                  DATE_STAMP=$(date +'%Y%m%d')
                  CURRENT_VERSION=$(grep '^version=' Source/pdxinfo | cut -d '=' -f 2)
                  NEW_VERSION="${CURRENT_VERSION}.${DATE_STAMP}"
                  sed -i '' -e "s/^version=.*/version=$NEW_VERSION/" -e "s/^buildNumber=.*/buildNumber=$DATE_STAMP/" Source/pdxinfo

            # Step 4: Build Universal Project (Device & Simulator)
            - name: Build Universal Project (Device & Simulator)
              run: make -j$(sysctl -n hw.ncpu)

            # Step 5: Get Simulator Artifact Name
            - name: Get Simulator Artifact Name
              id: artifact_details
              run: |
                  APP_VERSION=$(grep '^version=' Source/pdxinfo | cut -d '=' -f 2)
                  ARTIFACT_NAME="CrankBoy-Simulator-${APP_VERSION}-nightly-macos"
                  echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT

            # Step 6: Prepare Artifact for Upload
            - name: Prepare Artifact for Upload
              run: |
                  mkdir artifact_root
                  mv CrankBoy.pdx artifact_root/

            # Step 7: Upload Simulator Artifact
            - name: Upload Simulator Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.artifact_details.outputs.artifact_name }}
                  path: artifact_root/

    build_simulator_windows:
        name: Create Nightly Simulator Build (Windows)
        needs: check_for_commits
        if: needs.check_for_commits.outputs.has_new_commits == 'true'
        runs-on: windows-latest
        defaults:
            run:
                shell: msys2 {0}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                  submodules: "recursive"
                  lfs: true

            - name: Setup MSYS2 MinGW64
              uses: msys2/setup-msys2@v2
              with:
                  msystem: MINGW64
                  update: true
                  install: >-
                      mingw-w64-x86_64-gcc
                      mingw-w64-x86_64-make
                      mingw-w64-x86_64-cmake
                      mingw-w64-x86_64-pkg-config
                      make
                      unzip
                      p7zip
                      curl
                      tar
                      git
                      zip

            - name: Setup ARM GCC Toolchain and Playdate SDK from Submodule
              run: |
                  echo "Extracting ARM GCC toolchain from toolchain/win/..."
                  7z x toolchain/win/gcc-arm-none-eabi-9-2019-q4-major-win32.zip -ogcc-arm-toolchain -y
                  TOOLCHAIN_PATH="$(pwd)/gcc-arm-toolchain/bin"
                  echo "$TOOLCHAIN_PATH" >> $GITHUB_PATH
                  echo "Extracting SDK from toolchain/win/..."
                  7z x toolchain/win/PlaydateSDK-3.0.0.exe -oPlaydateSDK -y
                  echo "PLAYDATE_SDK_PATH=$(pwd)/PlaydateSDK" >> $GITHUB_ENV

            - name: Prepare Lua Scripts
              run: |
                  mkdir -p Source/scripts
                  for file in src/scripts/*.lua; do
                      if [ -e "$file" ]; then
                          base=$(basename "$file" .lua)
                          cp "$file" "Source/scripts/${base}.l"
                      fi
                  done

            - name: Update Version and Build Number
              run: |
                  DATE_STAMP=$(date +'%Y%m%d')
                  CURRENT_VERSION=$(grep '^version=' Source/pdxinfo | cut -d '=' -f 2)
                  NEW_VERSION="${CURRENT_VERSION}.${DATE_STAMP}"
                  sed -i -e "s/^version=.*/version=$NEW_VERSION/" -e "s/^buildNumber=.*/buildNumber=$DATE_STAMP/" Source/pdxinfo

            - name: Build Universal Project (Device & Simulator) for Windows
              run: |
                  export PLAYDATE_SDK_PATH="$(pwd)/PlaydateSDK"
                  export PATH="$(pwd)/gcc-arm-toolchain/bin:$PATH"
                  # Create build directory
                  mkdir -p build

                  # Build device binary using ARM GCC
                  echo "Building device binary..."
                  arm-none-eabi-gcc --version
                  make -j$(nproc) device

                  # Build simulator extension DLL
                  echo "Building simulator DLL..."
                  gcc -static -shared -DTARGET_SIMULATOR=1 -DTARGET_EXTENSION=1 \
                      -I . -I "$PLAYDATE_SDK_PATH/C_API" -I src -I libs \
                      -I libs/minigb_apu -I libs/lz4 -I libs/lua-5.4.7 -I libs/pdnewlib \
                      -o build/pdex.dll \
                      src/cscripts/*.c src/*.c src/scenes/*.c \
                      libs/minigb_apu/minigb_apu.c libs/pdnewlib/pdnewlib.c main.c \
                      libs/lua-5.4.7/onelua.c libs/lz4/lz4.c \
                      "$PLAYDATE_SDK_PATH/C_API/buildsupport/setup.c"

                  # Copy DLL to existing .pdx folder (which now contains device binary)
                  cp build/pdex.dll CrankBoy.pdx/

            - name: Get Windows Simulator Artifact Name
              id: artifact_details
              shell: bash
              run: |
                  APP_VERSION=$(grep '^version=' Source/pdxinfo | cut -d '=' -f 2)
                  ARTIFACT_NAME="CrankBoy-Simulator-${APP_VERSION}-nightly-windows"
                  echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT

            - name: Prepare Artifact for Upload
              run: |
                  mkdir -p artifact_root
                  mv CrankBoy.pdx artifact_root/

            - name: Upload Windows Simulator Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.artifact_details.outputs.artifact_name }}
                  path: artifact_root/
